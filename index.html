<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>YouTube Clone</title>
</head>
<body>
  <div class="video-grid">
    <div class="video-preview">
      <div class="video-thumbnail">
        <!-- here will be the image and time stamp inside another div with some padding bottom -->
      </div>
      <div class="video-details">
        <div class="video-profile-section">
          <!-- here will be the channel profile inside another div -->
        </div>
        <div class="detail-section">
          <div class="detail-section-title">
            <!-- here will be the title of video -->
          </div>
          <div class="detail-section-channel">
            <div class="channel-name">
              <!-- here will be the channel title-->
              </div>
            <div class="video-view-stats">
              <!-- here will be the channel views and years details-->
              </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
</body>
</html>
